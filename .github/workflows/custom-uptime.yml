name: Uptime CI
on:
  schedule:
    - cron: "*/5 * * * *"
  repository_dispatch:
    types: [uptime]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Check status
    runs-on: ubuntu-latest
    steps:
      - name: Create App token
        id: create_token
        uses: ssc-sp/.github/.github/actions/create-app-token@main
        with:
          app-id: ${{ vars.UPPTIME_MANAGER_ID }}
          private-key: ${{ secrets.UPPTIME_MANAGER_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.create_token.outputs.token }}
          
      - name: Get runner public IP
        id: runner_ip
        continue-on-error: true 
        run: |
          # try a list of reliable “what’s my IP” endpoints
          services=(
            "https://api.ipify.org"
            "https://ifconfig.me/ip"
            "https://icanhazip.com"
            "https://checkip.amazonaws.com"
          )
          ip=""
          for svc in "${services[@]}"; do
            ip=$(curl -fs "$svc") && break   # -f fails on HTTP errors, -s silences progress
          done
          ip=${ip:-"unknown"}                # fallback if all of them fail
          echo "Runner public IP: $ip"
          
      - name: Check endpoint status
        uses: upptime/uptime-monitor@e620a0d7a97526a295bbe3970495bff6495bdf27 # v1.41.0
        with:
          command: "update"
        env:
          GH_PAT: ${{ steps.create_token.outputs.token }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
