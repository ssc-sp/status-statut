name: Graphs CI
on:
  schedule:
    - cron: "0 0 * * *"
  repository_dispatch:
    types: [graphs]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Generate graphs
    runs-on: ubuntu-latest
    steps:
      - name: Create App token
        id: create_token
        uses: ssc-sp/.github/.github/actions/create-app-token@main
        with:
          app-id: ${{ vars.UPPTIME_MANAGER_ID }}
          private-key: ${{ secrets.UPPTIME_MANAGER_KEY }}
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.create_token.outputs.token }}
      - name: Generate graphs
        uses: upptime/uptime-monitor@e620a0d7a97526a295bbe3970495bff6495bdf27 # v1.41.0
        with:
          command: "graphs"
        env:
          GH_PAT: ${{ steps.create_token.outputs.token }}
